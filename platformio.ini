; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ws35b-release

[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    moononournation/GFX Library for Arduino@1.4.7
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3
    arduino-libraries/NTPClient@^3.2.1
    milesburton/DallasTemperature@^3.11.0
    paulstoffregen/OneWire@^2.3.7
    lewisxhe/XPowersLib@^0.2.9
    lewisxhe/SensorLib@^0.3.1
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.0
    mathworks/ThingSpeak@^2.0.0
build_flags_base =
    -I include
    -I src
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DWAVESHARE_ESP32S3_35B=1
    -DLCD_QSPI_CS=12
    -DLCD_QSPI_CLK=5
    -DLCD_QSPI_D0=1
    -DLCD_QSPI_D1=2
    -DLCD_QSPI_D2=3
    -DLCD_QSPI_D3=4
    -DLCD_BL_PIN=6
    -DSD_MMC_CLK=9
    -DSD_MMC_CMD=10
    -DSD_MMC_D0=11
    -DI2S_BCK_PIN=13
    -DI2S_LRCK_PIN=15
    -DI2S_DOUT_PIN=16
    -DI2S_DIN_PIN=14
    -DLCD_WIDTH=320
    -DLCD_HEIGHT=480
    -DHW_HARDENED=1
    -DESP_INTR_CPU_AFFINITY_AUTO=ESP_INTR_CPU_AFFINITY_0
    -DPSRAM_SAFE_MODE=1
    -O1
    -std=gnu++2a
    -DTFT_LIGHTGREY=0xC618U
    -DTFT_DARKGREY=0x7BEF
    -DTFT_ORANGE=0xFD20U
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=15
    -DCONFIG_ESP_BROWNOUT_DET_LVL=0
    -DCONFIG_ESP_INT_WDT_TIMEOUT_MS=5000
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

[env:ws35b-release]
upload_port = COM3
monitor_port = COM3
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
build_flags =
    ${common.build_flags_base}
    -O2
    -DCORE_DEBUG_LEVEL=0
    -DRELEASE_BUILD=1
board_build.partitions = partitions_16mb.csv
board_build.filesystem = spiffs
board_build.arduino.memory_type = qio_opi
board_build.sdkconfig = sdkconfig.defaults
platform_packages = toolchain-xtensa-esp-elf@14.2.0+20241119

[env:ws35b-debug]
upload_port = COM3
monitor_port = COM3
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
build_flags =
    ${common.build_flags_base}
    -Og -g
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_MODE=1
    -DHW_HARDENED_DEBUG=1
board_build.partitions = partitions_16mb.csv
board_build.filesystem = spiffs
board_build.arduino.memory_type = qio_opi
platform_packages = toolchain-xtensa-esp-elf@14.2.0+20241119